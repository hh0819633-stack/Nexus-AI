<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Nexus AI - Where Knowledge Meets Conversation</title>
    
    <!-- Markdown & Code Highlighting -->
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/highlight.js/11.9.0/styles/atom-one-dark.min.css">
    <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/katex@0.16.10/dist/katex.min.css">
    <script src="https://cdn.jsdelivr.net/npm/marked/marked.min.js"></script>
    <script src="https://cdn.jsdelivr.net/npm/katex@0.16.10/dist/katex.min.js"></script>
    <script src="https://cdn.jsdelivr.net/npm/katex@0.16.10/dist/contrib/auto-render.min.js"></script>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/highlight.js/11.9.0/highlight.min.js"></script>
    
    <style>
        :root {
            --bg: #0B0C10;
            --surface: #1F1F2E;
            --violet: #7C3AED;
            --cyan: #06B6D4;
            --text: #E2E8F0;
            --gray: #6B7280;
        }

        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            font-family: 'Inter', -apple-system, BlinkMacSystemFont, sans-serif;
            background: var(--bg);
            color: var(--text);
            height: 100vh;
            overflow: hidden;
        }

        /* Scrollbar */
        ::-webkit-scrollbar {
            width: 6px;
        }
        ::-webkit-scrollbar-track {
            background: var(--surface);
        }
        ::-webkit-scrollbar-thumb {
            background: var(--violet);
            border-radius: 4px;
        }

        /* Homepage */
        #homePage {
            height: 100vh;
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            text-align: center;
            background: radial-gradient(ellipse at center, rgba(124,58,237,0.1) 0%, var(--bg) 70%);
            position: relative;
        }
        #homePage h1 {
            font-size: clamp(3rem, 8vw, 6rem);
            font-weight: 800;
            background: linear-gradient(135deg, var(--violet), var(--cyan));
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
            background-clip: text;
            margin-bottom: 1rem;
        }
        #homePage p {
            font-size: 1.25rem;
            color: #9CA3AF;
            margin-bottom: 2rem;
        }
        .btn-start {
            padding: 1rem 2.5rem;
            background: var(--violet);
            color: white;
            border: none;
            border-radius: 999px;
            font-size: 1.1rem;
            font-weight: 600;
            cursor: pointer;
            transition: all 0.3s;
            text-decoration: none;
            display: inline-block;
        }
        .btn-start:hover {
            background: #6D28D9;
            box-shadow: 0 0 30px rgba(124,58,237,0.4);
            transform: translateY(-2px);
        }

        /* Chat Layout */
        #chatPage {
            display: none;
            height: 100vh;
            grid-template-columns: 260px 1fr;
        }
        #chatPage.active {
            display: grid;
        }

        /* Sidebar */
        .sidebar {
            background: var(--surface);
            padding: 1rem;
            display: flex;
            flex-direction: column;
            border-right: 1px solid #2D2D3F;
            overflow-y: auto;
        }
        .sidebar h2 {
            font-size: 1.5rem;
            font-weight: 700;
            background: linear-gradient(135deg, var(--violet), var(--cyan));
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
            background-clip: text;
            margin-bottom: 1rem;
        }
        .btn-new-chat {
            width: 100%;
            padding: 0.75rem;
            background: var(--violet);
            color: white;
            border: none;
            border-radius: 0.5rem;
            cursor: pointer;
            font-weight: 600;
            margin-bottom: 1rem;
            transition: background 0.2s;
        }
        .btn-new-chat:hover {
            background: #6D28D9;
        }
        .sidebar-section {
            margin-bottom: 1rem;
        }
        .sidebar-section h3 {
            font-size: 0.7rem;
            text-transform: uppercase;
            color: var(--gray);
            letter-spacing: 0.05em;
            margin-bottom: 0.5rem;
        }
        .chat-item {
            padding: 0.6rem 0.75rem;
            border-radius: 0.5rem;
            cursor: pointer;
            font-size: 0.85rem;
            display: flex;
            justify-content: space-between;
            align-items: center;
            transition: background 0.2s;
            margin-bottom: 0.25rem;
        }
        .chat-item:hover {
            background: #2D2D3F;
        }
        .chat-item.active {
            background: #2D2D3F;
            border-left: 3px solid var(--violet);
        }
        .pin-btn {
            background: none;
            border: none;
            cursor: pointer;
            font-size: 0.8rem;
        }

        /* Chat Area */
        .chat-main {
            display: flex;
            flex-direction: column;
            height: 100vh;
        }
        .chat-header {
            padding: 0.75rem 1.5rem;
            border-bottom: 1px solid #2D2D3F;
            display: flex;
            gap: 0.5rem;
            align-items: center;
            flex-wrap: wrap;
        }
        .chat-header select {
            padding: 0.5rem;
            border-radius: 0.5rem;
            background: var(--surface);
            color: var(--text);
            border: 1px solid #2D2D3F;
            font-size: 0.85rem;
        }
        .btn-regenerate {
            padding: 0.5rem 1rem;
            background: var(--surface);
            border: 1px solid #2D2D3F;
            border-radius: 0.5rem;
            color: var(--text);
            cursor: pointer;
            font-size: 0.85rem;
        }
        .btn-export {
            margin-left: auto;
            padding: 0.5rem 1rem;
            background: var(--surface);
            border: 1px solid #2D2D3F;
            border-radius: 0.5rem;
            color: var(--text);
            cursor: pointer;
            font-size: 0.85rem;
        }

        .messages-container {
            flex: 1;
            overflow-y: auto;
            padding: 1.5rem;
            display: flex;
            flex-direction: column;
            gap: 1rem;
        }
        .message {
            max-width: 80%;
            padding: 1rem 1.25rem;
            border-radius: 1rem;
            animation: fadeIn 0.3s ease;
            position: relative;
        }
        @keyframes fadeIn {
            from { opacity: 0; transform: translateY(10px); }
            to { opacity: 1; transform: translateY(0); }
        }
        .message.user {
            align-self: flex-end;
            background: var(--violet);
        }
        .message.assistant {
            align-self: flex-start;
            background: var(--surface);
            border: 1px solid #2D2D3F;
        }
        .message .copy-btn {
            position: absolute;
            top: 0.5rem;
            right: 0.5rem;
            background: rgba(255,255,255,0.1);
            border: none;
            color: var(--text);
            padding: 0.25rem 0.5rem;
            border-radius: 0.25rem;
            cursor: pointer;
            font-size: 0.7rem;
            opacity: 0;
            transition: opacity 0.2s;
        }
        .message:hover .copy-btn {
            opacity: 1;
        }
        .message pre {
            background: #0D0D1A;
            padding: 1rem;
            border-radius: 0.5rem;
            overflow-x: auto;
            margin: 0.5rem 0;
        }
        .message code {
            font-family: 'JetBrains Mono', monospace;
            font-size: 0.85rem;
        }
        .message table {
            border-collapse: collapse;
            width: 100%;
            margin: 0.5rem 0;
        }
        .message th, .message td {
            border: 1px solid #4B5563;
            padding: 0.5rem 0.75rem;
            text-align: left;
        }
        .message th {
            background: #1F1F2E;
        }
        .typing-indicator {
            align-self: flex-start;
            padding: 1rem;
            background: var(--surface);
            border-radius: 1rem;
            display: flex;
            gap: 0.3rem;
        }
        .typing-indicator span {
            width: 8px;
            height: 8px;
            background: var(--violet);
            border-radius: 50%;
            animation: bounce 1.4s infinite ease-in-out;
        }
        .typing-indicator span:nth-child(2) { animation-delay: 0.2s; }
        .typing-indicator span:nth-child(3) { animation-delay: 0.4s; }
        @keyframes bounce {
            0%, 80%, 100% { transform: scale(0); }
            40% { transform: scale(1); }
        }

        /* Input Area */
        .input-area {
            padding: 1rem 1.5rem;
            border-top: 1px solid #2D2D3F;
        }
        .input-row {
            display: flex;
            gap: 0.5rem;
            align-items: flex-end;
            max-width: 900px;
            margin: 0 auto;
        }
        .input-row textarea {
            flex: 1;
            background: transparent;
            border: 1px solid #2D2D3F;
            border-radius: 0.75rem;
            padding: 0.75rem 1rem;
            color: var(--text);
            resize: none;
            font-size: 0.95rem;
            font-family: inherit;
            outline: none;
            max-height: 150px;
        }
        .input-row textarea:focus {
            border-color: var(--violet);
        }
        .icon-btn {
            background: transparent;
            border: none;
            color: var(--text);
            cursor: pointer;
            padding: 0.5rem;
            border-radius: 0.5rem;
            font-size: 1.2rem;
            transition: background 0.2s;
            flex-shrink: 0;
        }
        .icon-btn:hover {
            background: #2D2D3F;
        }
        .icon-btn.recording {
            background: #EF4444;
            animation: pulse 1.5s infinite;
        }
        @keyframes pulse {
            0%, 100% { box-shadow: 0 0 0 0 rgba(239,68,68,0.4); }
            50% { box-shadow: 0 0 0 10px rgba(239,68,68,0); }
        }
        .send-btn {
            background: var(--violet);
            border: none;
            color: white;
            padding: 0.75rem 1.25rem;
            border-radius: 0.75rem;
            cursor: pointer;
            font-weight: 600;
            flex-shrink: 0;
            transition: background 0.2s;
        }
        .send-btn:hover {
            background: #6D28D9;
        }
        .send-btn:disabled {
            opacity: 0.5;
            cursor: not-allowed;
        }
        .stop-btn {
            background: #EF4444;
            border: none;
            color: white;
            padding: 0.75rem 1.25rem;
            border-radius: 0.75rem;
            cursor: pointer;
            font-weight: 600;
            flex-shrink: 0;
        }

        /* Drag & Drop */
        .drag-overlay {
            display: none;
            position: fixed;
            inset: 0;
            background: rgba(124,58,237,0.2);
            border: 3px dashed var(--violet);
            z-index: 100;
            align-items: center;
            justify-content: center;
            font-size: 1.5rem;
            font-weight: 600;
            pointer-events: none;
        }
        .drag-overlay.active {
            display: flex;
        }

        /* Responsive */
        @media (max-width: 768px) {
            #chatPage {
                grid-template-columns: 1fr;
            }
            .sidebar {
                display: none;
                position: fixed;
                inset: 0;
                z-index: 50;
                width: 280px;
            }
            .sidebar.open {
                display: flex;
            }
            .mobile-menu-btn {
                display: block !important;
            }
        }
        .mobile-menu-btn {
            display: none;
            position: fixed;
            top: 0.75rem;
            left: 0.75rem;
            z-index: 60;
            background: var(--surface);
            border: 1px solid #2D2D3F;
            color: var(--text);
            padding: 0.5rem;
            border-radius: 0.5rem;
            cursor: pointer;
        }
    </style>
</head>
<body>

    <!-- Drag overlay -->
    <div class="drag-overlay" id="dragOverlay">Drop files here</div>

    <!-- Mobile menu button -->
    <button class="mobile-menu-btn" id="mobileMenuBtn" onclick="toggleSidebar()">☰</button>

    <!-- HOMEPAGE -->
    <div id="homePage">
        <h1>Nexus AI</h1>
        <p>Where Knowledge Meets Conversation</p>
        <button class="btn-start" onclick="openChat()">Start Chat</button>
    </div>

    <!-- CHAT PAGE -->
    <div id="chatPage">
        <!-- Sidebar -->
        <aside class="sidebar" id="sidebar">
            <h2>Nexus AI</h2>
            <button class="btn-new-chat" onclick="newChat()">+ New Chat</button>
            <div class="sidebar-section">
                <h3>Pinned</h3>
                <div id="pinnedChats"></div>
            </div>
            <div class="sidebar-section">
                <h3>Recent</h3>
                <div id="recentChats"></div>
            </div>
        </aside>

        <!-- Main Chat -->
        <main class="chat-main">
            <div class="chat-header">
                <select id="modelSelect">
                    <option value="gpt-4o">GPT-4o</option>
                    <option value="gpt-4-turbo">GPT-4 Turbo</option>
                    <option value="gpt-3.5-turbo">GPT-3.5 Turbo</option>
                </select>
                <select id="personalitySelect">
                    <option value="assistant">Assistant</option>
                    <option value="teacher">Teacher</option>
                    <option value="programmer">Programmer</option>
                    <option value="writer">Writer</option>
                </select>
                <button class="btn-regenerate" onclick="regenerate()">🔄 Regenerate</button>
                <button class="btn-export" onclick="exportChat()">📥 Export</button>
            </div>
            <div class="messages-container" id="messagesContainer">
                <div style="text-align:center; color:var(--gray); margin-top:2rem;">
                    <p style="font-size:2rem;">✨</p>
                    <p>Start a conversation with Nexus AI</p>
                </div>
            </div>
            <div class="input-area" id="inputArea">
                <div class="input-row">
                    <button class="icon-btn" onclick="document.getElementById('fileInput').click()" title="Attach file">📎</button>
                    <input type="file" id="fileInput" style="display:none" onchange="handleFileUpload(this)" accept=".pdf,.txt,.md,.png,.jpg,.jpeg,.gif,.webp">
                    <button class="icon-btn" id="voiceBtn" onclick="toggleVoice()" title="Voice input">🎤</button>
                    <textarea id="userInput" rows="1" placeholder="Message Nexus AI..." onkeydown="handleKeyDown(event)"></textarea>
                    <button class="send-btn" id="sendBtn" onclick="sendMessage()">Send</button>
                    <button class="stop-btn" id="stopBtn" onclick="stopStreaming()" style="display:none;">Stop</button>
                </div>
            </div>
        </main>
    </div>

    <script>
        // ==================== STATE ====================
        let conversations = [];
        let currentConversationId = null;
        let messages = [];
        let isStreaming = false;
        let abortController = null;
        let recognition = null;

        const API_KEY_STORAGE_KEY = 'nexus_ai_api_key';
        const CONVERSATIONS_KEY = 'nexus_ai_conversations';

        // ==================== INITIALIZATION ====================
        function init() {
            loadConversations();
            setupDragDrop();
            setupPaste();
            
            // Check for saved API key
            const savedKey = localStorage.getItem(API_KEY_STORAGE_KEY);
            if (!savedKey) {
                const key = prompt('Enter your OpenAI API key (stored locally in your browser):');
                if (key) localStorage.setItem(API_KEY_STORAGE_KEY, key);
            }
        }

        function getApiKey() {
            return localStorage.getItem(API_KEY_STORAGE_KEY);
        }

        // ==================== NAVIGATION ====================
        function openChat() {
            document.getElementById('homePage').style.display = 'none';
            document.getElementById('chatPage').classList.add('active');
            newChat();
        }

        function toggleSidebar() {
            document.getElementById('sidebar').classList.toggle('open');
        }

        // ==================== CHAT MANAGEMENT ====================
        function newChat() {
            currentConversationId = 'conv_' + Date.now();
            messages = [];
            renderMessages();
            document.getElementById('userInput').focus();
            updateSidebar();
        }

        function loadConversations() {
            const saved = localStorage.getItem(CONVERSATIONS_KEY);
            if (saved) {
                conversations = JSON.parse(saved);
            } else {
                conversations = [];
            }
            updateSidebar();
        }

        function saveConversations() {
            localStorage.setItem(CONVERSATIONS_KEY, JSON.stringify(conversations));
        }

        function updateSidebar() {
            const pinned = conversations.filter(c => c.pinned);
            const recent = conversations.filter(c => !c.pinned).slice(0, 10);

            document.getElementById('pinnedChats').innerHTML = pinned.map(c => 
                `<div class="chat-item${c.id === currentConversationId ? ' active' : ''}" onclick="switchChat('${c.id}')">
                    <span>${c.title || 'Untitled'}</span>
                    <button class="pin-btn" onclick="event.stopPropagation();togglePin('${c.id}')">📌</button>
                </div>`
            ).join('');

            document.getElementById('recentChats').innerHTML = recent.map(c => 
                `<div class="chat-item${c.id === currentConversationId ? ' active' : ''}" onclick="switchChat('${c.id}')">
                    <span>${c.title || 'Untitled'}</span>
                    <button class="pin-btn" onclick="event.stopPropagation();togglePin('${c.id}')">📍</button>
                </div>`
            ).join('');
        }

        function switchChat(id) {
            const conv = conversations.find(c => c.id === id);
            if (conv) {
                currentConversationId = id;
                messages = conv.messages || [];
                renderMessages();
                updateSidebar();
                document.getElementById('sidebar').classList.remove('open');
            }
        }

        function togglePin(id) {
            const conv = conversations.find(c => c.id === id);
            if (conv) {
                conv.pinned = !conv.pinned;
                saveConversations();
                updateSidebar();
            }
        }

        function saveCurrentConversation() {
            const existing = conversations.find(c => c.id === currentConversationId);
            const title = messages.find(m => m.role === 'user')?.content?.slice(0, 40) || 'New Chat';
            if (existing) {
                existing.messages = mess
